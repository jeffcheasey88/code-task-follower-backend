services:
  database:
    image: postgres:17
    container_name: ctf-database
    environment:
      POSTGRES_DB: code-task-follower
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d code-task-follower"]
      interval: 1s
      timeout: 3s
      retries: 20
      start_period: 1s
    ports:
      - ":5432"
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ctf-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ctf-backend
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - ctf-network

  frontend:
    build:
      context: ../code-task-follower-frontend
      dockerfile: Dockerfile
    container_name: ctf-frontend
    ports:
      - "80:80"
    networks:
      - ctf-network

volumes:
  database-data:

networks:
  ctf-network:
    driver: bridge